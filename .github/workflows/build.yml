name: Build IPK

on:
  push:
    paths-ignore: ['repo.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - run: npm install -g @webosose/ares-cli

      - name: Build
        run: |
          ID=$(jq -r .id app/appinfo.json)
          VER=$(jq -r .version app/appinfo.json)
          TITLE=$(jq -r .title app/appinfo.json)

          ares-package app/ org.webosbrew.settingspatch.service/
          SHA=$(sha256sum ${ID}_${VER}_all.ipk | cut -d' ' -f1)
          ICON="https://raw.githubusercontent.com/$GITHUB_REPOSITORY/main/app/icon.png"
          IPK="https://github.com/$GITHUB_REPOSITORY/releases/download/$VER/${ID}_${VER}_all.ipk"

          jq -n \
            --arg id "$ID" --arg v "$VER" --arg t "$TITLE" \
            --arg sha "$SHA" --arg repo "$GITHUB_REPOSITORY" \
            --arg icon "$ICON" --arg ipk "$IPK" \
            '{paging:{page:1,count:1,maxPage:1,itemsTotal:1},packages:[{id:$id,title:$t,iconUri:$icon,manifest:{id:$id,version:$v,type:"web",title:$t,iconUri:$icon,sourceUrl:"https://github.com/\($repo)",rootRequired:true,ipkUrl:$ipk,ipkHash:{sha256:$sha}}}]}' \
            > repo.json

          echo "ID=$ID" >> $GITHUB_ENV
          echo "VER=$VER" >> $GITHUB_ENV

      - name: Commit & release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git diff --cached --quiet || (git commit -m "repo.json ${{ env.VER }} [skip ci]" && git push)
          git fetch --tags
          git tag | grep -q "^${{ env.VER }}$" || gh release create "${{ env.VER }}" *.ipk
